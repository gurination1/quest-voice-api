<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Quest Voice API architecture">
  <rect width="1200" height="700" fill="#08131B"/>
  <text x="60" y="80" fill="#F4FBFF" font-family="Arial, sans-serif" font-size="40" font-weight="700">Quest Voice API Architecture</text>
  <text x="60" y="120" fill="#9BC2D1" font-family="Arial, sans-serif" font-size="20">Device STT + Cloud Reply + Device TTS with Neo Qwen 3.5 9B</text>

  <rect x="60" y="180" rx="22" ry="22" width="250" height="170" fill="#103244" stroke="#7FD2EA" stroke-width="2"/>
  <text x="90" y="225" fill="#F4FBFF" font-family="Arial, sans-serif" font-size="28" font-weight="700">Quest App</text>
  <text x="90" y="270" fill="#D2E6EF" font-family="Arial, sans-serif" font-size="22">Device STT</text>
  <text x="90" y="305" fill="#D2E6EF" font-family="Arial, sans-serif" font-size="22">Device TTS</text>
  <text x="90" y="340" fill="#D2E6EF" font-family="Arial, sans-serif" font-size="22">3D Avatar / UI</text>

  <rect x="420" y="150" rx="22" ry="22" width="300" height="230" fill="#152A35" stroke="#76AFC1" stroke-width="2"/>
  <text x="460" y="205" fill="#F4FBFF" font-family="Arial, sans-serif" font-size="30" font-weight="700">Cloudflare Worker</text>
  <text x="460" y="250" fill="#D2E6EF" font-family="Arial, sans-serif" font-size="22">API Keys</text>
  <text x="460" y="285" fill="#D2E6EF" font-family="Arial, sans-serif" font-size="22">/reply</text>
  <text x="460" y="320" fill="#D2E6EF" font-family="Arial, sans-serif" font-size="22">/session/respond</text>
  <text x="460" y="355" fill="#D2E6EF" font-family="Arial, sans-serif" font-size="22">/v1/chat/completions</text>

  <rect x="830" y="180" rx="22" ry="22" width="300" height="170" fill="#103244" stroke="#7FD2EA" stroke-width="2"/>
  <text x="870" y="225" fill="#F4FBFF" font-family="Arial, sans-serif" font-size="28" font-weight="700">Cloudflare Tunnel</text>
  <text x="870" y="270" fill="#D2E6EF" font-family="Arial, sans-serif" font-size="22">Named Tunnel</text>
  <text x="870" y="305" fill="#D2E6EF" font-family="Arial, sans-serif" font-size="22">HTTPS ingress</text>

  <rect x="420" y="470" rx="22" ry="22" width="300" height="170" fill="#152A35" stroke="#76AFC1" stroke-width="2"/>
  <text x="470" y="515" fill="#F4FBFF" font-family="Arial, sans-serif" font-size="30" font-weight="700">Neo Proxy</text>
  <text x="470" y="560" fill="#D2E6EF" font-family="Arial, sans-serif" font-size="22">Auth proxy</text>
  <text x="470" y="595" fill="#D2E6EF" font-family="Arial, sans-serif" font-size="22">OpenAI-compatible API</text>

  <rect x="830" y="470" rx="22" ry="22" width="300" height="170" fill="#103244" stroke="#7FD2EA" stroke-width="2"/>
  <text x="870" y="515" fill="#F4FBFF" font-family="Arial, sans-serif" font-size="28" font-weight="700">llama-server</text>
  <text x="870" y="560" fill="#D2E6EF" font-family="Arial, sans-serif" font-size="22">Qwen 3.5 9B</text>
  <text x="870" y="595" fill="#D2E6EF" font-family="Arial, sans-serif" font-size="22">localhost:8080</text>

  <line x1="310" y1="265" x2="420" y2="265" stroke="#F26B3A" stroke-width="6"/>
  <polygon points="420,265 400,253 400,277" fill="#F26B3A"/>

  <line x1="720" y1="265" x2="830" y2="265" stroke="#F26B3A" stroke-width="6"/>
  <polygon points="830,265 810,253 810,277" fill="#F26B3A"/>

  <line x1="980" y1="350" x2="980" y2="470" stroke="#F26B3A" stroke-width="6"/>
  <polygon points="980,470 968,450 992,450" fill="#F26B3A"/>

  <line x1="830" y1="555" x2="720" y2="555" stroke="#F26B3A" stroke-width="6"/>
  <polygon points="720,555 740,543 740,567" fill="#F26B3A"/>

  <line x1="720" y1="525" x2="830" y2="525" stroke="#76AFC1" stroke-width="4" stroke-dasharray="10 8"/>
  <polygon points="830,525 810,513 810,537" fill="#76AFC1"/>

  <text x="75" y="640" fill="#9BC2D1" font-family="Arial, sans-serif" font-size="18">Recommended default: headset handles mic + TTS locally, cloud handles reply generation and auth.</text>
</svg>
